# =============================================================================
# 🛶 Sales Kayak Prediction Dashboard - Docker Compose
# =============================================================================

version: '3.8'

services:
  sales-kayak-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: sales-kayak-dashboard:latest
    container_name: sales-kayak-app
    ports:
      - "7860:7860"
    volumes:
      # Persist models
      - ./models:/app/models
      # Mount data (if updating externally)
      - ./data:/app/data
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:7860')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# Optional: Add volume for persistent storage
volumes:
  models:
  data:
